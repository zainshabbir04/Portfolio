<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Muhammad Zain Shabbir profile logo</title>
  <defs>
    <linearGradient id="ring" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0B1120"/>
  <circle cx="32" cy="32" r="30" fill="url(#ring)"/>
  <image href="profile-logo.png" x="6" y="6" width="52" height="52" clip-path="url(#clip)" preserveAspectRatio="xMidYMid slice"/>
</svg>